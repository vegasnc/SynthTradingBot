<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DemoBot Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="app">
    <header class="header-bar">
      <h1 class="logo">DemoBot Options</h1>
    </header>
    <main class="panel">
      <section class="options-card card">
        <h2>Engine</h2>
        <div class="field">
          <label for="engineUrl">Engine base URL</label>
          <input id="engineUrl" type="text" placeholder="http://127.0.0.1:8000" />
        </div>
        <div class="options-actions">
          <button id="save">Save</button>
          <span id="status" class="options-status"></span>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
