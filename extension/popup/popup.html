<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>DemoBot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <h2 class="popup-logo">DemoBot</h2>
      <span id="status" class="popup-status">Loading...</span>
    </header>
    <section class="initial-funds card">
      <h3>Funds</h3>
      <div class="funds-row">
        <label>Deposit</label>
        <input type="number" id="initialFundsInput" min="0" step="100" readonly />
        <button id="toggleEditFunds" type="button" title="Edit">🔒</button>
      </div>
      <div class="funds-row remaining-row">
        <label>Remaining</label>
        <span id="remainingFunds">—</span>
      </div>
      <div class="exposure-by-asset">
        <h4>Exposure by asset</h4>
        <div id="exposureByAssetList" class="exposure-list"></div>
      </div>
    </section>
    <section class="stats card">
      <h3>Stats</h3>
      <div id="statsGrid" class="stats-grid"></div>
    </section>
    <section class="assets card">
      <h3>Spot & Strike</h3>
      <div id="assetSpotList" class="asset-spot-list"></div>
    </section>
    <section class="news card">
      <h3>News</h3>
      <div id="newsSummary" class="news-summary">—</div>
      <a id="newsLink" href="#" class="link">Open News →</a>
    </section>
    <section class="positions card">
      <h3>Positions</h3>
      <div id="positionsCount">0 open</div>
      <div class="positions-controls">
        <label for="positionsPeriod">Period</label>
        <select id="positionsPeriod">
          <option value="day">Today</option>
          <option value="week" selected>Week</option>
          <option value="month">Month</option>
          <option value="year">Year</option>
          <option value="all">All</option>
        </select>
      </div>
      <div id="positionsList" class="positions-list"></div>
    </section>
    <a id="openDashboard" href="#">Open Dashboard</a>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
